<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>

    <!-- Text / Accent Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="35%" stop-color="#C084FC" />
      <stop offset="70%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#FB7185" />
    </linearGradient>

    <!-- Glow/Neon Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#A855F7" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.8" />
    </linearGradient>

    <!-- Metallic/Clean Gradient for details -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#9CA3AF" stop-opacity="0.6" />
    </linearGradient>

    <!-- Soft radial glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .title {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 900;
      font-size: 54px;
      fill: url(#primaryGrad);
    }
    .subtitle {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 500;
      font-size: 20px;
      fill: #9CA3AF;
      letter-spacing: 1px;
    }
    .badge {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 700;
      font-size: 13px;
      fill: #ffffff;
      letter-spacing: 2px;
    }
    .tagline {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 600;
      font-size: 24px;
      fill: #E5E7EB;
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.07">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Glowing background circles -->
  <circle cx="1000" cy="200" r="180" fill="url(#glowGrad)" opacity="0.25" filter="url(#glow)" />
  <circle cx="200" cy="250" r="130" fill="#4F46E5" opacity="0.15" filter="url(#glow)" />

  <!-- Abstract Design Elements: Waves / Laser lines (representing scanning/watermark detection) -->
  <path d="M-100,320 Q 250,220 600,300 T 1300,240" fill="none" stroke="url(#primaryGrad)" stroke-width="3" opacity="0.3" />
  <path d="M-100,340 Q 200,280 650,260 T 1300,310" fill="none" stroke="url(#primaryGrad)" stroke-width="1.5" opacity="0.2" />

  <!-- Central/Right Illustrative Element: SOTA AI Processing representation -->
  <g transform="translate(880, 200)">
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#primaryGrad)" stroke-width="2" stroke-dasharray="10 15" opacity="0.4" />
    <!-- Rotating Scanner Effect -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="url(#glowGrad)" stroke-width="1" opacity="0.6" />
    <!-- Outer glow hexagon -->
    <polygon points="0,-85 73.6,-42.5 73.6,42.5 0,85 -73.6,42.5 -73.6,-42.5" fill="none" stroke="#F472B6" stroke-width="2" opacity="0.7" filter="url(#subtleGlow)" />
    
    <!-- Central Symbol: Video Play + Magic Eraser Sparkles -->
    <!-- Video Player Hexagon/Shield -->
    <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" fill="#1F2937" stroke="url(#primaryGrad)" stroke-width="3" />
    <!-- Play Icon -->
    <polygon points="-10,-18 18,0 -10,18" fill="url(#metalGrad)" />
    
    <!-- Scanning Laser Line removing watermark -->
    <line x1="-70" y1="-10" x2="70" y2="-10" stroke="#FB7185" stroke-width="3" opacity="0.8" filter="url(#subtleGlow)" />
    
    <!-- Magic sparkles (representing removal) -->
    <path d="M 35,-45 L 38,-35 L 48,-32 L 38,-29 L 35,-19 L 32,-29 L 22,-32 L 32,-35 Z" fill="#FBBF24" filter="url(#subtleGlow)" />
    <path d="M -45,30 L -43,36 L -37,38 L -43,40 L -45,46 L -47,40 L -53,38 L -47,36 Z" fill="#F472B6" />
    <path d="M 50,40 L 51,43 L 54,44 L 51,45 L 50,48 L 49,45 L 46,44 L 49,43 Z" fill="#38BDF8" />
  </g>

  <!-- Left Content Area -->
  <g transform="translate(80, 0)">
    <!-- Pill Badge -->
    <g transform="translate(0, 85)">
      <rect width="130" height="28" rx="14" fill="#1E1B4B" stroke="#4338CA" stroke-width="1.5" />
      <text x="65" y="18" text-anchor="middle" class="badge">SOTA AI TECH</text>
    </g>

    <!-- Title -->
    <text x="0" y="170" class="title">Awesome Watermark</text>
    <text x="0" y="235" class="title">Remover Videos</text>

    <!-- Tagline / Description -->
    <text x="0" y="290" class="tagline">The Ultimate Guide to Video Watermark Removal</text>
    <text x="0" y="325" class="subtitle">Curated AI Research, Open Source Tools &amp; Cloud SaaS</text>
  </g>

  <!-- Subtle Corner Decors -->
  <rect x="20" y="20" width="15" height="2" fill="#818CF8" opacity="0.5" />
  <rect x="20" y="20" width="2" height="15" fill="#818CF8" opacity="0.5" />
  <rect x="1165" y="20" width="15" height="2" fill="#FB7185" opacity="0.5" />
  <rect x="1178" y="20" width="2" height="15" fill="#FB7185" opacity="0.5" />
</svg>
